<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Twitch Account</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-self: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: white;
        }

        .container {
            background-color: #2f3136;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        input {
            padding: 10px;
            border-radius: 4px;
            border: none;
            width: 250px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            border-radius: 4px;
            border: none;
            background-color: #6441a5;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #7d5bbe;
        }

        #message {
            margin-top: 15px;
            font-weight: bold;
        }

        .success {
            color: #43b581;
        }

        .error {
            color: #f04747
        }
    </style>
</head>

<body>
    <script type="module" src="./twitchlinked.js"></script>
    <script type="module" defer></script>
    <div class="container">
        <h2>Link your Twitch Channel</h2>
        <input type="text" id="twitchInput" placeholder="Enter Twitch Username">
        <br>
        <button id="linkBtn">Link Account</button>
        <div id="message"></div>
    </div>
</body>
